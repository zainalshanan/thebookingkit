name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: thebookingkit
          POSTGRES_USER: thebookingkit
          POSTGRES_PASSWORD: thebookingkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thebookingkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://thebookingkit:thebookingkit@localhost:5432/thebookingkit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/demo

      - name: Build packages
        run: npx turbo build

      - name: Run database migrations
        run: npx drizzle-kit push
        working-directory: packages/db

      - name: Seed database
        run: npx tsx src/seed.ts
        working-directory: packages/db

      - name: Run E2E tests
        run: npm run e2e
        working-directory: apps/demo

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/demo/playwright-report/
          retention-days: 14
