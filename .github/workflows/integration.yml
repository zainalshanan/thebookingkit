name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://thebookingkit:thebookingkit@localhost:5432/thebookingkit

jobs:
  integration:
    name: DB Integration Tests (Postgres 15)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: thebookingkit
          POSTGRES_USER: thebookingkit
          POSTGRES_PASSWORD: thebookingkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thebookingkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npx turbo build

      - name: Push Drizzle schema to database
        working-directory: packages/db
        run: |
          # drizzle-kit push requires interactive confirmation — pipe yes to auto-accept
          echo "yes" | npx drizzle-kit push

      - name: Verify tables were created
        run: |
          node -e "
            const postgres = require('postgres');
            const sql = postgres(process.env.DATABASE_URL);
            sql\`SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename\`
              .then(rows => {
                console.log('Tables created:', rows.length);
                rows.forEach(r => console.log('  -', r.tablename));
                if (rows.length === 0) { console.error('ERROR: No tables created!'); process.exit(1); }
                return sql.end();
              })
              .catch(err => { console.error('Verification failed:', err); process.exit(1); });
          "

      - name: Run custom SQL migrations
        working-directory: packages/db
        run: node --import tsx/esm src/migrate.ts

      - name: Run DB integration tests
        working-directory: packages/db
        run: npx vitest run src/__tests__/integration.test.ts
